<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ahmas Kitchen — Back Soon</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --charcoal: #22201B;
    --charcoal-deep: #1A1815;
    --board: #2E3229;
    --board-edge: #3B4033;
    --butter: #E8B93F;
    --butter-dim: #C79A2E;
    --cream: #F3EAD6;
    --cream-dim: #B9AF9A;
    --brick: #A8452F;
    --string: #6B6152;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: var(--charcoal);
    background-image:
      radial-gradient(ellipse at 50% -10%, rgba(232,185,63,0.08), transparent 55%),
      repeating-linear-gradient(0deg, rgba(0,0,0,0.05) 0px, rgba(0,0,0,0.05) 1px, transparent 1px, transparent 3px);
    color: var(--cream);
    font-family: 'DM Sans', sans-serif;
    overflow-x: hidden;
  }

  .stage {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 8vh 20px 6vh;
    position: relative;
  }

  /* Hook on the wall */
  .hook {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #8b8370, #4a4536);
    box-shadow: 0 2px 6px rgba(0,0,0,0.5);
    margin-bottom: -2px;
    z-index: 3;
  }

  /* String from hook to sign */
  .string {
    width: 2px;
    height: 46px;
    background: linear-gradient(var(--string), var(--string));
    transform-origin: top center;
    z-index: 2;
  }

  .sign-wrap {
    transform-origin: top center;
    animation: swing 6s ease-in-out infinite;
  }

  @keyframes swing {
    0%, 100% { transform: rotate(-2.3deg); }
    50% { transform: rotate(2.3deg); }
  }

  .board {
    width: min(420px, 86vw);
    background: var(--board);
    border: 10px solid var(--board-edge);
    border-radius: 10px;
    padding: 46px 34px 38px;
    box-shadow:
      0 30px 60px -20px rgba(0,0,0,0.7),
      inset 0 0 40px rgba(0,0,0,0.35);
    position: relative;
    text-align: center;
  }

  .board::before {
    content: '';
    position: absolute;
    top: -20px;
    left: 50%;
    transform: translateX(-50%);
    width: 2px;
    height: 20px;
    background: var(--string);
  }

  .eyebrow {
    font-size: 12px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--brick);
    font-weight: 700;
    margin-bottom: 14px;
  }

  .headline {
    font-family: 'Caveat', cursive;
    font-size: 64px;
    line-height: 0.95;
    color: var(--butter);
    font-weight: 700;
    margin: 0 0 6px;
    text-shadow: 0 2px 0 rgba(0,0,0,0.3);
  }

  .subhead {
    font-family: 'Caveat', cursive;
    font-size: 30px;
    color: var(--cream);
    margin: 0 0 22px;
    font-weight: 600;
  }

  .divider {
    width: 60px;
    height: 2px;
    background: var(--cream-dim);
    opacity: 0.35;
    margin: 0 auto 22px;
  }

  .message {
    font-size: 15px;
    line-height: 1.65;
    color: var(--cream-dim);
    margin: 0 0 26px;
    font-weight: 400;
  }

  .status-row {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    border: 1px solid rgba(243,234,214,0.15);
    border-radius: 999px;
    font-size: 13px;
    color: var(--cream-dim);
    letter-spacing: 0.02em;
  }

  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--brick);
    box-shadow: 0 0 0 3px rgba(168,69,47,0.2);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.45; }
  }

  .footer {
    margin-top: 34px;
    text-align: center;
  }

  .footer-name {
    font-family: 'Caveat', cursive;
    font-size: 22px;
    color: var(--cream-dim);
    font-weight: 600;
    letter-spacing: 0.02em;
  }

  .footer-sub {
    font-size: 12px;
    color: var(--cream-dim);
    opacity: 0.55;
    margin-top: 4px;
    letter-spacing: 0.04em;
  }

  @media (prefers-reduced-motion: reduce) {
    .sign-wrap { animation: none; }
    .dot { animation: none; }
  }

  @media (max-width: 480px) {
    .headline { font-size: 50px; }
    .subhead { font-size: 24px; }
  }
</style>
</head>
<body>
  <div class="stage">
    <div class="hook"></div>
    <div class="string"></div>
    <div class="sign-wrap">
      <div class="board">
        <div class="eyebrow">Ahmas Kitchen</div>
        <h1 class="headline">Back in a bit</h1>
        <p class="subhead">the kitchen's being seasoned</p>
        <div class="divider"></div>
        <p class="message">We're updating the menu and tidying the counter, we'll be plating up again shortly.</p>
        <div class="status-row">
          <span class="dot"></span>
          <span>Currently closed for updates</span>
        </div>
      </div>
    </div>
    <div class="footer">
      <div class="footer-name">Ahmas Kitchen</div>
      <div class="footer-sub">THANK YOU FOR YOUR PATIENCE</div>
    </div>
  </div>
</body>
</html>
